<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 310px; margin: 0; background: #16161f; color: #eee; font: 13px/1.45 system-ui,sans-serif; }
  header { padding: 11px 14px; background: #4c1de7; font-size: 15px; font-weight: 700; }
  main { padding: 12px 14px; }
  #host { color: #99a; font-size: 11px; margin-bottom: 10px; word-break: break-all; }
  button { width: 100%; display: block; margin: 8px 0; padding: 10px; border: 1px solid transparent; border-radius: 9px; color: #fff; font: inherit; text-align: left; cursor: pointer; }
  #pickBar { background: #30245d; }
  #setNext { background: #4a3010; border-color: #9a6200; }
  #setOk { background: #123b50; border-color: #16769e; }
  button:hover { filter: brightness(1.2); }
  .mark { float: right; color: #8b8b9b; }
  .mark.set { color: #4ade80; font-weight: 700; }
  #status { margin-top: 12px; min-height: 38px; padding: 9px 10px; border-radius: 8px; background: #20202e; color: #cbd5e1; font-size: 12px; }
  #progressTrack { height: 7px; margin-top: 7px; overflow: hidden; border-radius: 999px; background: #343445; }
  #progressFill { width: 0; height: 100%; background: #7c4dff; transition: width .25s linear; }
  #clear { margin-top: 12px; background: transparent; color: #f87171; text-align: center; font-size: 12px; }
  .hint { margin-top: 8px; color: #7f7f91; font-size: 11px; }
</style>
</head>
<body>
  <header>AutoNext — Simple</header>
  <main>
    <div id="host">Loading…</div>
    <button id="pickBar">1. Set the progress bar <span id="barMark" class="mark">not set</span></button>
    <button id="setNext">2. 🟠 Set permanent NEXT spot <span id="nextMark" class="mark">not set</span></button>
    <button id="setOk">3. 🔵 Set permanent popup OK spot <span id="okMark" class="mark">optional</span></button>
    <div id="status">Loading…</div>
    <div id="progressTrack"><div id="progressFill"></div></div>
    <button id="clear">Clear these three settings</button>
    <div class="hint">Set the progress bar first. The orange and blue markers stay on the page and can always be dragged again.</div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
